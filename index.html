<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Partner點餐網頁</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        :root {
            --orange: #ff8a00;
            --orange-700: #ff6a00;
            --ink: #222;
            --muted: #6b7280;
            --bg: #f7f7f7;
            --card: #fff;
            --shadow: 0 8px 24px rgba(0,0,0,.08);
            --radius: 16px;
            --fab-right-gap: 24px;
            --left-pad: 0px;
            --graffiti-overlap: -90px;
            --graffiti-lift: 0px;
            --brand-shift: 0px;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            overflow-x: hidden;
        }

        body {
            margin: 0;
            font-family: ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans TC","Helvetica Neue",Arial;
            color: var(--ink);
            background: var(--bg);
        }

        .muted {
            color: var(--muted);
        }

        .preline {
            white-space: pre-line;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 50;
            backdrop-filter: saturate(180%) blur(10px);
            background: rgba(255,255,255,.85);
            border-bottom: 1px solid #eee;
        }

        .topbar-inner {
            max-width: 520px;
            margin: 0 auto;
            padding: 0 1rem;
            padding-left: calc(env(safe-area-inset-left,0px) + 1rem + var(--left-pad));
            padding-right: calc(env(safe-area-inset-right,0px) + 1rem);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: nowrap;
            overflow: visible;
            min-width: 0;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0;
            white-space: nowrap;
            line-height: 0;
            transform: translateX(var(--brand-shift));
            flex: 1 1 auto;
            min-width: 0;
            overflow: hidden;
        }

            .brand #logo {
                height: clamp(60px,8vw,72px);
                width: clamp(60px,8vw,72px);
                border-radius: 50%;
                object-fit: cover;
                border: 2px solid #fff;
                box-shadow: 0 6px 14px rgba(0,0,0,.10);
                flex: 0 0 auto;
            }

            .brand .graffiti {
                display: block;
                height: clamp(120px,0vw,180px);
                width: auto;
                object-fit: contain;
                filter: drop-shadow(0 2px 0 rgba(0,0,0,.28));
                margin-left: var(--graffiti-overlap);
                transform: translateY(var(--graffiti-lift));
                max-width: 100%;
                flex: 1 1 auto;
            }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: .45rem;
            flex: 0 0 auto;
            margin-left: auto;
        }

        .btn-ghost {
            border: 1px solid #e5e7eb;
            background: #fff;
            padding: .45rem .75rem;
            border-radius: 999px;
            cursor: pointer;
            font-weight: 800;
        }

        .btn-cart {
            white-space: nowrap;
            border: 2px solid var(--orange);
            color: var(--orange);
            background: #fff;
            padding: .5rem 1rem;
            border-radius: 999px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 3px 10px rgba(255,138,0,.18);
        }

            .btn-cart:hover {
                background: #fff7ea;
            }

        .badge {
            background: var(--orange);
            color: #fff;
            font-weight: 900;
            border-radius: 999px;
            padding: .1rem .55rem;
            font-size: .95rem;
            box-shadow: 0 2px 6px rgba(255,138,0,.35);
        }

        .container {
            max-width: 520px;
            margin: 0 auto;
            padding: 1rem;
            padding-left: calc(env(safe-area-inset-left,0px) + 1rem + var(--left-pad));
            padding-right: calc(env(safe-area-inset-right,0px) + 1rem);
        }

        .card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 1.2rem;
            border: 1px solid #eef2f7;
        }

        #page-menu.card {
            background: #CCCCCC !important;
            box-shadow: inset 0 1px 0 rgba(255,255,255,.35), inset 0 -1px 0 rgba(0,0,0,.06);
            border: 0 !important;
        }

        #page-home.card {
            background: linear-gradient(180deg,#fff,#fff9f1 60%,#fff);
        }

        .btn-primary {
            border: none;
            width: 100%;
            background: linear-gradient(160deg,var(--orange),var(--orange-700));
            color: #fff;
            font-weight: 1000;
            letter-spacing: .04em;
            padding: 1.05rem 1rem;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 16px 32px rgba(255,138,0,.25);
            font-size: 1.1rem;
        }

        .tabs {
            display: flex;
            gap: .5rem;
            margin-bottom: .6rem;
            position: sticky;
            top: 72px;
            z-index: 60;
            background: rgba(255,255,255,.96);
            backdrop-filter: blur(10px);
            border-radius: 999px;
            padding: .35rem;
            border: 1px solid rgba(255,255,255,.55);
            overflow-x: auto;
            overflow-y: hidden;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

            .tabs::-webkit-scrollbar {
                display: none;
            }

        .tab {
            flex: 1 0 72px;
            min-width: 72px;
            text-align: center;
            padding: .6rem .4rem;
            border-radius: 999px;
            cursor: pointer;
            user-select: none;
            background: rgba(255,255,255,.85) !important;
            border: 1px solid rgba(255,255,255,.7) !important;
            color: #374151;
            font-weight: 900;
        }

            .tab.active {
                background: var(--orange) !important;
                color: #fff;
                border-color: transparent !important;
                box-shadow: 0 8px 18px rgba(255,138,0,.28);
            }

        .grid {
            display: grid;
            grid-template-columns: repeat(2,minmax(0,1fr));
            gap: .7rem;
        }

        .card-item {
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            background: #fff;
            border: 1px solid rgba(0,0,0,.05) !important;
            box-shadow: 0 6px 14px rgba(0,0,0,.08), 0 1px 0 rgba(255,255,255,.6) inset;
        }

        .thumb {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            display: block;
            background: #e9e9e9 !important;
        }

        .thumb-wrap {
            position: relative;
        }

        .sold-mask {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,.45);
            color: #fff;
            font-weight: 1000;
            letter-spacing: .2em;
            font-size: 1.1rem;
        }

        .card-body {
            padding: .55rem .7rem .7rem;
            display: grid;
            grid-template-columns: 1fr;
            gap: .25rem;
        }

        .card-title {
            font-weight: 1000;
            line-height: 1.2;
            word-break: break-word;
        }

        .card-price {
            color: var(--muted);
            font-weight: 1000;
        }

        .section {
            scroll-margin-top: 120px;
        }

        .section-header {
            position: sticky;
            top: 126px;
            z-index: 35;
            background: linear-gradient(160deg, #ff8a00, #ff6a00) !important;
            backdrop-filter: blur(6px);
            border-radius: 18px;
            border: none;
            box-shadow: 0 6px 14px rgba(255,138,0,.22);
            margin: 0 0 .8rem;
            padding: .7rem .8rem .65rem;
            min-height: 54px;
            display: flex;
            align-items: center;
        }

        .section-title {
            font-size: 1.35rem;
            font-weight: 1000;
            margin: 0;
            color: #fff;
            letter-spacing: .04em;
        }

        #menuLong {
            padding-bottom: .6rem;
        }

        .fab {
            position: fixed;
            right: 16px;
            bottom: 20px;
            z-index: 60;
            display: flex;
            align-items: center;
            gap: .6rem;
            background: #fff;
            color: var(--orange);
            font-weight: 1000;
            border: 2px solid var(--orange);
            padding: .6rem 1.1rem;
            border-radius: 999px;
            cursor: pointer;
            box-shadow: var(--shadow);
        }

        .modal {
            padding: 0 10px;
            text-align: initial;
            position: fixed;
            inset: 0 !important;
            display: none;
            align-items: center !important;
            justify-content: center !important;
            z-index: 80;
            background: rgba(0,0,0,.35);
        }

            .modal.show {
                display: flex !important;
            }

        .dialog {
            width: min(94vw,420px);
            max-height: 85vh;
            overflow-y: auto;
            margin: 0 auto;
            background: #fff;
            border-radius: 18px;
            box-shadow: var(--shadow);
            padding: 1.1rem 1.1rem 1.3rem;
            position: relative;
        }

            .dialog .x {
                position: absolute;
                right: .8rem;
                top: .6rem;
                font-size: 1.5rem;
                color: #cbd5e1;
                cursor: pointer;
                user-select: none;
            }

        .btn-full {
            width: 100%;
            padding: .85rem 1rem;
            border: none;
            border-radius: 12px;
            background: var(--orange);
            color: #fff;
            font-weight: 1000;
            cursor: pointer;
        }

        #addToCart {
            font-size: 1.25rem;
            padding: 1rem 1rem;
        }

        .btn-soft {
            width: 100%;
            margin-top: .9rem;
            border: 1px solid #e5e7eb;
            background: #fff;
            border-radius: 14px;
            padding: .85rem 1rem;
            font-weight: 1000;
            cursor: pointer;
        }

        #orderDetailModal .btn-soft[data-close="orderDetailModal"] {
            font-size: 1.3rem;
            padding: 1rem 1rem;
        }

        #odIdPill {
            font-size: 1.35rem;
            padding: .56rem .85rem;
            font-weight: 1000;
        }

        #odIdPill .order-no {
            font-size: 1.85rem;
            font-weight: 1000;
            color: var(--orange-700);
            line-height: 1;
        }

        #odIdPill .order-code {
            font-size: 1rem;
            font-weight: 1000;
            color: #334155;
            line-height: 1;
        }

        .confirm-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: .7rem;
            margin-top: 1rem;
        }

        .confirm-actions .btn-soft,
        .confirm-actions .btn-full {
            margin-top: 0;
        }

        @media (max-width: 460px) {
            .confirm-actions {
                grid-template-columns: 1fr;
            }
        }

        #page-cart .cart-card {
            margin: .75rem 0;
            padding: 1rem 1rem .9rem;
            border: 1px solid #eef2f7;
            border-radius: 16px;
            background: #fff;
            box-shadow: 0 10px 22px rgba(0,0,0,.06);
        }

        #page-cart .cart-row {
            display: grid;
            grid-template-columns: 1fr auto auto;
            align-items: center;
            gap: .6rem;
        }

        #page-cart .cart-name {
            font-weight: 1000;
            line-height: 1.25;
        }

        #page-cart .qty {
            width: 76px;
            height: 38px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: .35rem .6rem;
            text-align: center;
            font-weight: 900;
            background: #fff;
        }

        #page-cart .price {
            font-weight: 1000;
            min-width: 70px;
            text-align: right;
        }

        #page-cart .btn-remove {
            border: 1px solid #e5e7eb;
            background: #fff;
            padding: .45rem .7rem;
            border-radius: 999px;
            cursor: pointer;
            font-weight: 900;
        }

        #page-cart .opt {
            margin: .35rem 0 0;
            color: #6b7280;
            font-size: .95rem;
        }

        .welcome-title {
            font-weight: 1000;
            margin: .2rem 0 .6rem;
            font-size: 1.15rem;
        }

        .welcome-section {
            padding: .8rem 0;
            border-top: 1px solid #eef2f7;
        }

            .welcome-section:first-of-type {
                border-top: none;
                padding-top: .2rem;
            }

        .welcome-sub {
            color: #475569;
            font-weight: 1000;
            margin: .2rem 0 .35rem;
        }

        .welcome-desc {
            color: #64748b;
            font-size: .95rem;
            margin: 0 0 .65rem;
        }

        .order-type-grid {
            display: grid;
            grid-template-columns: repeat(2,minmax(0,1fr));
            gap: .6rem;
            margin: .75rem 0;
        }

        .order-type-btn {
            border: 2px solid #e5e7eb;
            background: #fff;
            color: #111827;
            border-radius: 14px;
            padding: .85rem .7rem;
            cursor: pointer;
            font-weight: 1000;
            min-height: 54px;
        }

        .order-type-btn.active {
            border-color: var(--orange);
            background: #fff7ed;
            color: var(--orange-700);
        }

        .order-type-btn:focus-visible {
            outline: 3px solid rgba(255,138,0,.28);
            outline-offset: 2px;
        }

        .btn-orange {
            width: 100%;
            border: none;
            background: linear-gradient(160deg,var(--orange),var(--orange-700));
            color: #fff;
            font-weight: 1000;
            padding: .9rem 1rem;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 14px 26px rgba(255,138,0,.22);
        }

        .btn-orange:disabled {
            opacity: .5;
            cursor: not-allowed;
            box-shadow: none;
        }

        .join-row {
            display: flex;
            gap: .5rem;
            align-items: center;
        }

        .join-input {
            flex: 1;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: .75rem .8rem;
            font-weight: 1000;
            letter-spacing: .25em;
            text-align: center;
            font-size: 1.05rem;
            outline: none;
        }

        .join-btn, .copy-btn {
            border: 1px solid #e5e7eb;
            background: #fff;
            border-radius: 12px;
            padding: .75rem 1rem;
            font-weight: 1000;
            cursor: pointer;
            white-space: nowrap;
        }

        .code-row {
            display: flex;
            gap: .6rem;
            align-items: center;
            margin-top: .6rem;
        }

        .code-box {
            flex: 1;
            background: #f8fafc;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            padding: .8rem .9rem;
            text-align: center;
            font-weight: 1000;
            font-size: 1.4rem;
            letter-spacing: .22em;
            color: #0f172a;
        }

        .menu-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: .6rem;
            gap: .5rem;
            flex-wrap: wrap;
        }

        .menu-head-actions {
            display: flex;
            gap: .5rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .presence {
            width: 100%;
            display: flex;
            gap: .45rem;
            align-items: center;
            flex-wrap: wrap;
            padding: .55rem .65rem;
            border-radius: 14px;
            background: rgba(255,255,255,.8) !important;
            border: 1px solid rgba(255,255,255,.7) !important;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: .35rem;
            padding: .35rem .6rem;
            border-radius: 999px;
            font-weight: 900;
            color: #334155;
            background: rgba(255,255,255,.9) !important;
            border: 1px solid rgba(255,255,255,.75) !important;
        }

        .upsell-wrap {
            margin-top: .85rem;
        }

        .upsell-section {
            border-top: 1px solid #eef2f7;
            padding-top: .9rem;
            margin-top: .9rem;
        }

            .upsell-section:first-child {
                border-top: none;
                padding-top: 0;
                margin-top: 0;
            }

        .upsell-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: .6rem;
            margin-bottom: .25rem;
        }

        .upsell-title {
            font-size: 1.02rem;
            font-weight: 1000;
        }

        .upsell-sub {
            color: #6b7280;
            font-size: .9rem;
            margin-bottom: .65rem;
        }

        .upsell-pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 48px;
            height: 28px;
            padding: 0 .55rem;
            border-radius: 999px;
            background: #f3f4f6;
            color: #6b7280;
            font-size: .82rem;
            font-weight: 900;
        }

        .upsell-list {
            display: grid;
            gap: .5rem;
        }

        .upsell-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: .75rem;
            align-items: center;
            padding: .65rem 0;
        }

            .upsell-row + .upsell-row {
                border-top: 1px solid #f1f5f9;
            }

        .upsell-left {
            min-width: 0;
        }

        .upsell-name {
            font-weight: 1000;
            line-height: 1.25;
        }

        .upsell-meta {
            margin-top: .2rem;
            color: #6b7280;
            font-size: .9rem;
            display: flex;
            flex-wrap: wrap;
            gap: .35rem .55rem;
            align-items: center;
        }

        .upsell-img-row {
            display: grid;
            grid-template-columns: 56px 1fr auto;
            gap: .7rem;
            align-items: center;
            padding: .65rem 0;
        }

        .upsell-thumb {
            width: 56px;
            height: 56px;
            object-fit: cover;
            border-radius: 12px;
            background: #eee;
            border: 1px solid #f1f5f9;
        }

        .upsell-price {
            font-weight: 1000;
            color: #db2777;
            white-space: nowrap;
        }

        .upsell-old {
            color: #9ca3af;
            text-decoration: line-through;
            font-size: .9rem;
        }

        .upsell-controls {
            display: flex;
            align-items: center;
            gap: .45rem;
        }

        .circle-btn {
            width: 34px;
            height: 34px;
            border-radius: 999px;
            border: 1px solid #d1d5db;
            background: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            line-height: 1;
            cursor: pointer;
            color: #374151;
        }

        .upsell-qty {
            min-width: 1.4rem;
            text-align: center;
            font-weight: 1000;
        }

        .check-btn {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            border: 2px solid #9ca3af;
            background: #fff;
            cursor: pointer;
            position: relative;
            flex: 0 0 auto;
        }

            .check-btn.active {
                border-color: var(--orange);
                background: #fff7ea;
            }

                .check-btn.active::after {
                    content: '✓';
                    position: absolute;
                    inset: 0;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    color: var(--orange);
                    font-weight: 1000;
                }

        .toast {
            position: fixed;
            left: 50%;
            bottom: calc(92px + env(safe-area-inset-bottom));
            transform: translateX(-50%);
            background: rgba(15,23,42,.94);
            color: #fff;
            padding: .78rem 1rem;
            border-radius: 14px;
            z-index: 999;
            font-weight: 900;
            max-width: 86vw;
            text-align: center;
        }

        .card-item.text-only {
            padding: 0;
            border-radius: 14px;
            overflow: hidden;
        }

        .text-only-body {
            padding: .9rem .95rem;
            display: flex;
            flex-direction: column;
            gap: .35rem;
        }

        .card-title-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: .6rem;
        }

        .sold-text {
            color: #dc2626;
            font-weight: 1000;
            white-space: nowrap;
        }

        .text-desc {
            font-size: .9rem;
            line-height: 1.35;
            white-space: pre-line;
        }

        .text-only-upsell {
            grid-template-columns: 1fr auto;
        }

            .text-only-upsell .upsell-left {
                min-width: 0;
            }

        @media (max-width: 480px) {
            :root {
                --fab-right-gap: 16px;
                --graffiti-overlap: -26px;
            }

            .topbar-inner {
                gap: 8px;
                padding-left: calc(env(safe-area-inset-left,0px) + .75rem + var(--left-pad));
                padding-right: calc(env(safe-area-inset-right,0px) + .75rem);
            }

            .brand #logo {
                height: 54px;
                width: 54px;
            }

            .brand .graffiti {
                height: 50px;
                max-width: 180px;
            }

            .btn-ghost, .btn-cart {
                padding: .42rem .7rem;
                font-size: .92rem;
            }

            #openCartTop #txtCartTop {
                display: none;
            }

            .container {
                padding: .75rem;
                padding-top: .6rem;
                padding-left: calc(env(safe-area-inset-left,0px) + .75rem + var(--left-pad));
                padding-right: calc(env(safe-area-inset-right,0px) + .75rem);
            }

            #page-menu.card, #page-home.card, #page-cart.card {
                padding: .95rem;
                border-radius: 14px;
            }

            .menu-head {
                align-items: stretch;
            }

            .menu-head-actions {
                width: 100%;
                display: grid;
                grid-template-columns: repeat(3, minmax(0,1fr));
                gap: .45rem;
            }

                .menu-head-actions .btn-ghost {
                    width: 100%;
                    padding: .55rem .35rem;
                    font-size: .92rem;
                }

            .tab {
                flex: 0 0 66px;
                min-width: 66px;
                font-size: .94rem;
                padding: .72rem .3rem;
            }

            .grid {
                grid-template-columns: repeat(2,minmax(0,1fr));
                gap: .6rem;
            }

            .dialog {
                width: min(96vw, 420px);
                max-height: 88vh;
                padding: 1rem 1rem 1.15rem;
                border-radius: 16px;
            }

            .upsell-img-row {
                grid-template-columns: 48px 1fr auto;
                gap: .55rem;
            }

            .upsell-thumb {
                width: 48px;
                height: 48px;
            }

            .fab {

        function sanitizeText(raw, maxLen = 60) {
            return String(raw || '')
                .replace(/[\u0000-\u001f\u007f]/g, '')
                .replace(/[<>`"'\\]/g, '')
                .replace(/\s+/g, ' ')
                .trim()
                .slice(0, maxLen);

        function sanitizeNickname(raw) {
            let v = sanitizeText(raw, CLIENT_LIMITS.nicknameMaxLen);
            if (!v) return '';
            const blockedExact = new Set(['店員', '老闆', '櫃檯', '管理員', '系統管理員', '客服', 'admin', 'administrator', 'staff', 'owner', 'system']);
            if (blockedExact.has(v) || blockedExact.has(v.toLowerCase())) v = '訪客';
            return v;
        }

        function clampInt(n, min, max, fallback = min) {
            const v = Number(n);
            if (!Number.isFinite(v)) return fallback;
            return Math.min(max, Math.max(min, Math.floor(v)));
        }

        function safePrice(n) {
            return clampInt(n, 0, CLIENT_LIMITS.maxPrice, 0);

        function normalizeAddOn(a) {
            if (!a || typeof a !== 'object') return null;
            const name = sanitizeText(a.name || '', 40);
            if (!name) return null;
            return { key: sanitizeText(a.key || name, 40), name, enName: sanitizeText(a.enName || '', 60), price: safePrice(a.price) };
        }

        function normalizeExtra(ex) {
            if (!ex || typeof ex !== 'object') return null;
            const name = sanitizeText(ex.name || '', 50);
            if (!name) return null;
            const temp = ex.temp === 'hot' ? 'hot' : (ex.temp === 'cold' ? 'cold' : null);
            return {
                key: sanitizeText(ex.key || name, 50),
                name,
                enName: sanitizeText(ex.enName || '', 60),
                price: safePrice(ex.price),
                qty: clampInt(ex.qty, 1, CLIENT_LIMITS.maxQtyPerLine, 1),
                temp,
                tempSelectable: !!ex.tempSelectable,
                category: sanitizeText(ex.category || '', 20)
            };
        }

        function normalizeCartItem(item) {
            if (!item || typeof item !== 'object') return null;
            const name = sanitizeText(item.name || '', 60);
            if (!name) return null;
            const addOns = Array.isArray(item.addOns) ? item.addOns.map(normalizeAddOn).filter(Boolean).slice(0, CLIENT_LIMITS.maxAddonsPerItem) : [];
            const extras = Array.isArray(item.extras) ? item.extras.map(normalizeExtra).filter(Boolean).slice(0, CLIENT_LIMITS.maxExtrasPerItem) : [];
            const temp = item.temp === 'hot' ? 'hot' : (item.temp === 'cold' ? 'cold' : null);
            return {
                key: sanitizeText(item.key || name, 60),
                name,
                enName: sanitizeText(item.enName || '', 80),
                price: safePrice(item.price),
                qty: clampInt(item.qty, 1, CLIENT_LIMITS.maxQtyPerLine, 1),

        async function fetchSoldRemote() {
            try {
                const r = await fetch(`${BASE_API}/soldout`, { cache: 'no-store' });
                if (!r.ok) throw new Error('soldout fail');
                const j = await r.json();
                const list = Array.isArray(j) ? j : (Array.isArray(j.items) ? j.items : []);
                setSold(list);
                return list;
            } catch {
                return getSold();
            }
        }

        function isSold(item, cIdx = -1, idx = -1) {
            const sold = getSold();

            if (cIdx >= 0 && idx >= 0) {
                return sold.some(([ci, ii]) => ci === cIdx && ii === idx);
            }

            return sold.includes(item?.name) || sold.includes(item?.key);
        }

        function soldKeyMatches(key) {
            const sold = getSold();
            if (sold.includes(key)) return true;

            for (let cIdx = 0; cIdx < MENU.length; cIdx += 1) {
                const category = MENU[cIdx];
                for (let idx = 0; idx < category.items.length; idx += 1) {
                    const item = category.items[idx];
                    if (item.name === key || item.key === key || item.enName === key) {
                        if (isSold(item, cIdx, idx)) return true;
                    }
                }
            }

            return false;
        }

        function connectSocket() {
            if (socket) return;
            socket = io(SOCKET_URL, { transports: ["websocket", "polling"] });

            socket.on("connect", () => {
                mySocketId = socket.id;
                const sessionId = getOrderId();
                const nickname = sanitizeNickname(getNickname() || nextGuestName()) || '訪客';
                if (sessionId) {
                    safeSocketEmit("join_session", { sessionId, nickname }, { guardKey: `join_session:${sessionId}`, gapMs: CLIENT_LIMITS.joinCooldownMs });
                }
            });

            socket.on("session_state", (st) => {
                const activeSessionId = getOrderId();
                if (st?.sessionId && activeSessionId && String(st.sessionId) !== String(activeSessionId)) return;
                if (submitBusy && submitPreviewSnapshot?.sessionId && String(submitPreviewSnapshot.sessionId) === String(activeSessionId)) return;
                const incomingCart = Array.isArray(st.cart) ? st.cart : [];
                cart = mergeItemsIntoCart([], incomingCart);
                total = calcCartTotal(cart);
                users = Array.isArray(st.users) ? st.users : [];
                locks = st.locks || {};

                updatePresence();
                updateCartCount();
                saveCartCache(getOrderId());

                if (isVisible($('#page-cart'))) renderCart();
            });

            socket.on("lock_update", (p) => {
                if (!p?.lineId) return;
                locks[p.lineId] = { byName: sanitizeNickname(p.byName || '') || '訪客' };
                if (isVisible($('#page-cart'))) renderCart();
            });

            socket.on("lock_remove", (p) => {
                if (!p?.lineId) return;
                delete locks[p.lineId];
                if (isVisible($('#page-cart'))) renderCart();
            });

            socket.on("lock_denied", (p) => toast(`被 ${sanitizeNickname(p?.byName || '') || '其他人'} 鎖定中`));
            socket.on("op_rejected", (p) => toast(`操作失敗：${sanitizeText(p?.reason || '未知原因', 60)}`));

            socket.on("submit_result", (res) => {
                submitBusy = false;
                $('#sendOrder').disabled = false;

                if (res && res.ok) {
                    const submittedSid = getOrderId();
                    submitPreviewSubmitted = true;
                    if (submitPreviewSnapshot) {
                        submitPreviewSnapshot.orderNo = res.order?.orderId || res.orderId || submitPreviewSnapshot.orderNo;
                        submitPreviewSnapshot.orderId = submitPreviewSnapshot.orderNo;
                        submitPreviewSnapshot.sessionId = submittedSid || submitPreviewSnapshot.sessionId || submitPreviewSnapshot.id;
                        submitPreviewSnapshot.requestId = res.requestId || submitPreviewSnapshot.requestId || '';
                        if (res.order?.items) {
                            submitPreviewSnapshot.items = normalizeCartPayload(res.order.items);
                            submitPreviewSnapshot.time = res.order.time || submitPreviewSnapshot.time;
                        }
                    }
                    console.info('[order-submit][frontend-result]', {
                        requestId: res.requestId || submitPreviewSnapshot?.requestId || '',
                        sessionId: submittedSid,
                        ticketId: res.ticketId,
                        orderId: res.orderId,
                        items: res.order?.items || submitPreviewSnapshot?.items || []
                    });
                    saveSubmittedOrderSnapshot();
                    renderSubmitPreviewDetail();
                    setSubmitReviewState();
                    toast(t('submitSuccessToast'));
                    forgetSubmittedOrderSession(submittedSid);
                } else {
                    toast(sanitizeText(res?.msg || '送出失敗', 60));
                    setSubmitReviewState();
                }
            });

            socket.on("order_detail_result", (res) => {
                orderDetailBusy = false;
                if (!res?.ok) {
                    toast(sanitizeText(res?.msg || '訂單明細讀取失敗', 60));
                    return;
                }

                if (!res.exists || !res.order) {
                    if (submitPreviewMode && submitPreviewSnapshot) {
                        renderSubmitPreviewDetail();
                        openModal('orderDetailModal');
                        return;
                    }
                    renderOrderDetail(null);
                    openModal('orderDetailModal');
                    return;
                }

                lastOrderDetail = res.order;

                if (submitPreviewMode) {
                    submitPreviewSnapshot = {
                        id: res.order.id || getOrderId(),
                        sessionId: res.order.sessionId || submitPreviewSnapshot?.sessionId || getOrderId(),
                        orderNo: res.order.orderId || submitPreviewSnapshot?.orderNo || '',
                        orderId: res.order.orderId || submitPreviewSnapshot?.orderNo || '',
                        time: res.order.time || submitPreviewSnapshot?.time || '--',
                        items: normalizeCartPayload(res.order.items || [])
                    };
                    if (submitPreviewSubmitted) saveSubmittedOrderSnapshot();
                    renderSubmitPreviewDetail();
                    openModal('orderDetailModal');
                    return;
                }

                renderOrderDetail(res.order);
                openModal('orderDetailModal');
            });

            socket.on("error_msg", (e) => {
                submitBusy = false;
                orderDetailBusy = false;
                $('#sendOrder').disabled = false;
                setSubmitReviewState();
                const msg = sanitizeText(e?.msg || 'error', 80);
                toast(msg);
                if (msg.includes('查無此訂單代碼') || msg.includes('已過期') || msg.toLowerCase().includes('expired')) {
                    resetSubmitPreviewState();
                    clearOrderSession();
                    goHome();
                    restoreWelcomeModalFull();
                    setTimeout(() => {
                        openModal('welcomeModal');
                    }, 200);
                }
            });
        }

        function calcExtraLineTotal(extras = []) {
            return extras.reduce((sum, ex) => sum + Number(ex.price || 0) * Number(ex.qty || 0), 0);
        }

        function calcLinePrice(it) {
            const base = Number(it?.price || 0);
            const addSum = (it?.addOns || []).reduce((s, a) => s + Number(a?.price || 0), 0);
            const extraSum = calcExtraLineTotal(it?.extras || []);
            const qty = Math.max(1, Number(it?.qty || 1));

            return (base + addSum) * qty + extraSum;
        }

        function calcCartTotal(arr) {
            return (arr || []).reduce((sum, it) => sum + calcLinePrice(it), 0);
        }

        function bindSectionSpy() {
            if (sectionSpyHandler) {
                window.removeEventListener('scroll', sectionSpyHandler);
            }

            sectionSpyHandler = () => {
                const sections = visibleMenuEntries()
                    .map(({ cIdx }) => ({ cIdx, el: document.getElementById(`section-${cIdx}`) }))
                    .filter(({ el }) => Boolean(el));

                let current = 0;
                const offset = 160;

                sections.forEach(({ cIdx, el }) => {
                    const top = el.getBoundingClientRect().top;
                    if (top - offset <= 0) current = cIdx;
                });

                if (current !== activeTab) {
                    activeTab = current;
                    renderTabs();
                    scrollActiveTabIntoView();
                }
            };

            window.addEventListener('scroll', sectionSpyHandler, { passive: true });
        }

        function renderTabs() {
            const el = $('#categoryTabs');

            el.innerHTML = visibleMenuEntries().map(({ category, cIdx }) => `
                <div class="tab ${cIdx === activeTab ? 'active' : ''}" data-ci="${cIdx}">
                    ${tz(category.title)}

            `).join('');

            $$('#categoryTabs .tab').forEach(tab => {
                tab.onclick = () => {
                    const ci = Number(tab.getAttribute('data-ci'));
                    activeTab = ci;
                    renderTabs();

                    const target = document.getElementById(`section-${ci}`);
                    if (target) {
                        const y = target.getBoundingClientRect().top + window.scrollY - 140;
                        window.scrollTo({ top: y, behavior: 'smooth' });
                    }
                };
            });
        }

        function scrollActiveTabIntoView() {
            const tabs = $('#categoryTabs');
            const active = $('#categoryTabs .tab.active');
            if (!tabs || !active) return;

            const targetLeft = active.offsetLeft - (tabs.clientWidth - active.clientWidth) / 2;
            const maxLeft = Math.max(0, tabs.scrollWidth - tabs.clientWidth);
            const nextLeft = Math.max(0, Math.min(targetLeft, maxLeft));

            tabs.scrollTo({ left: nextLeft, behavior: 'smooth' });
        }

        function switchCategoryByDelta() {
            return;

        function getScrollState() {
            const scrollTop = window.scrollY || document.documentElement.scrollTop;
            const viewport = window.innerHeight;
            const fullHeight = Math.max(
                document.body.scrollHeight,
                document.documentElement.scrollHeight
            );

            return {
                nearBottom: scrollTop + viewport >= fullHeight - 6,
                nearTop: scrollTop <= 2
            };
        }

        window.addEventListener('wheel', (e) => {
            if (!isVisible($('#page-menu'))) return;
            if (isVisible($('#page-cart'))) return;
            if ($('#itemModal').classList.contains('show')) return;
            if ($('#welcomeModal').classList.contains('show')) return;
            if ($('#orderDetailModal').classList.contains('show')) return;
            if (switchCooldown) return;

            const st = getScrollState();

            if (e.deltaY > 0 && st.nearBottom) {
                wheelDownAccum += Math.abs(e.deltaY);
                wheelUpAccum = 0;
                if (wheelDownAccum > 24) switchCategoryByDelta(1);
            } else {
                wheelUpAccum = 0;
                wheelDownAccum = 0;
            }
        }, { passive: true });

        window.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0]?.clientY || 0;
        }, { passive: true });

        window.addEventListener('touchend', (e) => {
            if (!isVisible($('#page-menu'))) return;
            if (isVisible($('#page-cart'))) return;
            if ($('#itemModal').classList.contains('show')) return;
            if ($('#welcomeModal').classList.contains('show')) return;
            if ($('#orderDetailModal').classList.contains('show')) return;
            if (switchCooldown) return;

            const endY = e.changedTouches[0]?.clientY || 0;
            const diff = touchStartY - endY;
            const st = getScrollState();

            if (diff > 46 && st.nearBottom) {
                switchCategoryByDelta(1);
            }
        }, { passive: true });

        function isUpsellOptionSold(opt) {
            if (!opt) return false;
            const soldoutKeys = Array.isArray(opt.soldoutKeys) ? opt.soldoutKeys : [];
            const inferredKeys = [opt.name, opt.enName, opt.key].filter(Boolean);
            const keys = [...soldoutKeys, ...inferredKeys];
            if (!keys.length) return false;
            return keys.some((key) => soldKeyMatches(key));
        }

        function updateItemModalPrice() {
            if (!tempItem) return;

            const qty = Math.max(1, Number(tempItem.qty || 1));
            const base = Number(tempItem.price || 0);
            const regularAddOns = (tempItem.addOns || []).reduce((sum, addOn) => sum + Number(addOn.price || 0), 0);
            const upgradeTotal = (tempItem.extras || [])
                .filter(ex => ex.sectionKey === 'upgrade_fries')
                .reduce((sum, ex) => sum + Number(ex.price || 0) * Number(ex.qty || 0), 0);
            const detachedExtrasTotal = (tempItem.extras || [])
                .filter(ex => ex.sectionKey !== 'upgrade_fries')
                .reduce((sum, ex) => sum + Number(ex.price || 0) * Number(ex.qty || 0), 0);
            const totalPrice = (base + regularAddOns + upgradeTotal) * qty + detachedExtrasTotal;

            $('#mPrice').textContent = `＄${totalPrice}`;
            $('#addToCart').textContent = lang === 'zh'
                ? `加入購物車 · ＄${totalPrice}`
                : `Add to Cart · $${totalPrice}`;
        }

        function syncUpsellDraft() {
            if (!tempItem) return;

            const sections = tempItem.extraSections || [];
            const extras = [];

            sections.forEach((sec) => {
                (sec.items || []).forEach((opt) => {
                    if (isUpsellOptionSold(opt)) {
                        opt.qty = 0;
                        return;
                    }

                    const qty = Math.max(0, parseInt(opt.qty || 0, 10) || 0);
                    if (qty <= 0) return;

                    extras.push({
                        key: opt.key,
                        name: opt.name,
                        enName: opt.enName,
                        price: Number(opt.price || 0),
                        qty,
                        originalPrice: Number(opt.originalPrice || 0),
                        sectionKey: sec.key,
                        sectionTitle: displayUpsellText(sec.title),
                        img: opt.img || '',
                        tempSelectable: !!opt.tempSelectable,
                        temp: opt.tempSelectable ? (opt.temp || 'cold') : null
                    });
                });
            });

            tempItem.extras = extras;
            updateItemModalPrice();
        }

        document.addEventListener('click', (e) => {
            if (!tempItem) return;

            const minusBtn = e.target.closest('[data-upsell-minus]');
            if (minusBtn) {
                const [sIdx, iIdx] = minusBtn.getAttribute('data-upsell-minus').split(':').map(Number);
                const sec = tempItem.extraSections?.[sIdx];
                const opt = sec?.items?.[iIdx];
                if (!sec || !opt) return;
                if (isUpsellOptionSold(opt)) {
                    opt.qty = 0;
                    renderUpsellSections();
                    syncUpsellDraft();
                    return;
                }

                opt.qty = Math.max(0, Number(opt.qty || 0) - 1);
                renderUpsellSections();
                syncUpsellDraft();
                return;
            }

            const plusBtn = e.target.closest('[data-upsell-plus]');
            if (plusBtn) {
                const [sIdx, iIdx] = plusBtn.getAttribute('data-upsell-plus').split(':').map(Number);
                const sec = tempItem.extraSections?.[sIdx];
                const opt = sec?.items?.[iIdx];
                if (!sec || !opt) return;
                if (isUpsellOptionSold(opt)) {
                    opt.qty = 0;
                    renderUpsellSections();
                    syncUpsellDraft();
                    toast(lang === 'zh' ? '此品項已估清' : 'This item is sold out');
                    return;
                }

                const current = getSectionPickedCount(sec);
                if (sec.maxTotal && current >= sec.maxTotal) {
                    toast(`此區最多可選 ${sec.maxTotal}`);
                    return;
                }

                opt.qty = Number(opt.qty || 0) + 1;
                renderUpsellSections();
                syncUpsellDraft();
                return;
            }

            const checkBtn = e.target.closest('[data-upsell-check]');
            if (checkBtn) {
                const [sIdx, iIdx] = checkBtn.getAttribute('data-upsell-check').split(':').map(Number);
                const sec = tempItem.extraSections?.[sIdx];
                const opt = sec?.items?.[iIdx];
                if (!sec || !opt) return;
                if (isUpsellOptionSold(opt)) {
                    opt.qty = 0;
                    renderUpsellSections();
                    syncUpsellDraft();
                    toast(lang === 'zh' ? '此品項已估清' : 'This item is sold out');
                    return;
                }

                const willCheck = !(Number(opt.qty || 0) > 0);
                if (willCheck && sec.maxTotal && getSectionPickedCount(sec) >= sec.maxTotal) {
                    toast(`此區最多可選 ${sec.maxTotal}`);
                    return;
                }

                opt.qty = willCheck ? 1 : 0;
                renderUpsellSections();
                syncUpsellDraft();
            }
        });

        function cartItemMergeKey(it) {
            const addOns = (it.addOns || [])
                .map(a => `${a.key || a.name}:${Number(a.price || 0)}`)
                .sort()
                .join('|');
            const extras = (it.extras || [])
                .map(ex => `${ex.key || ex.name}:${Number(ex.price || 0)}:${Number(ex.qty || 0)}:${ex.temp || ''}`)
                .sort()
                .join('|');

            return JSON.stringify({
                key: it.key || '',
                name: it.name || '',
                price: Number(it.price || 0),
                temp: it.temp || null,
                addOns,
                extras,
                category: it.category || ''
            });
        }

        function mergeItemsIntoCart(baseCart, itemsToAdd) {
            const next = Array.isArray(baseCart) ? [...baseCart] : [];

            (itemsToAdd || []).forEach((item) => {
                const normalized = {
                    ...item,
                    qty: Math.max(1, Number(item.qty || 1))
                };

                const key = cartItemMergeKey(normalized);
                const found = next.find(x => cartItemMergeKey(x) === key);

                if (found) {
                    found.qty = Math.max(1, Number(found.qty || 1)) + normalized.qty;

                    if (!found.lineId && normalized.lineId) {
                        found.lineId = normalized.lineId;
                    }
                } else {
                    next.push(normalized);
                }
            });

            return next;
        }

        function openItemModal(cIdx, iIdx) {
            const cat = MENU[cIdx];
            const item = cat.items[iIdx];

            tempItem = {
                lineId: crypto.randomUUID ? crypto.randomUUID() : (Date.now().toString(16) + Math.random().toString(16).slice(2)),
                key: sanitizeText(item.key || item.name || '', 60),
                name: sanitizeText(item.name || '', 60),
                enName: sanitizeText(item.enName || '', 80),
                price: safePrice(item.price),
                qty: 1,
                temp: null,
                addOns: [],
                extras: [],
                extraSections: cloneUpsellSectionsByMenuKey(cat.key),
                addedBy: null,
                category: sanitizeText(cat?.title?.zh || cat?.key || '', 20)
            };

            $('#mName').textContent = displayName(item);
            $('#mPrice').textContent = `＄${safePrice(item.price)}`;

            const desc = displayDesc(item);
            $('#mDesc').textContent = desc;
            $('#mDesc').style.display = desc ? '' : 'none';
            $('#mQty').textContent = '1';

            if (item.addOns && item.addOns.length) {
                $('#addonWrap').style.display = '';
                $('#addonBox').innerHTML = item.addOns.map((a, idx) => `
                    <label class="btn-ghost" style="display:flex;gap:.5rem;align-items:center;justify-content:flex-start;border-radius:12px;padding:.55rem .7rem;">
                        <input type="checkbox" data-addon="${idx}" style="accent-color:var(--orange);">
                        <span style="font-weight:1000">${lang === 'en' ? (a.enName || a.name) : a.name}</span>
                    </label>
                `).join('');
                tempItem.addOns = [];
                $$('#addonBox input[type="checkbox"]').forEach(ch => {
                    ch.onchange = () => {
                        const idx = Number(ch.getAttribute('data-addon'));
                        const a = item.addOns[idx];
                        const obj = normalizeAddOn({ key: a.key, name: a.name, enName: a.enName, price: a.price });
                        if (!obj) return;
                        if (ch.checked) {
                            tempItem.addOns.push(obj);
                            tempItem.addOns = tempItem.addOns.slice(0, CLIENT_LIMITS.maxAddonsPerItem);
                        } else {
                            tempItem.addOns = tempItem.addOns.filter(x => x.key !== obj.key);
                        }
                        updateItemModalPrice();
                    };
                });
            } else {
                $('#addonWrap').style.display = 'none';
                $('#addonBox').innerHTML = '';
                tempItem.addOns = [];
            }

            const tempOptions = item.tempOptions || [];
            if (tempOptions.length > 0) {
                $('#tempWrap').style.display = '';
                $('#tempBox').innerHTML = tempOptions.map(k => `
                    <label class="btn-ghost" style="display:flex;gap:.5rem;align-items:center;border-radius:999px;">
                        <input type="radio" name="temp" value="${k}" style="accent-color:var(--orange);">
                        <span style="font-weight:1000">${I18N.tempOptions[k][lang]}</span>
                    </label>
                `).join('');
                tempItem.temp = tempOptions[0] === 'hot' ? 'hot' : 'cold';
                const first = $(`#tempBox input[value="${tempItem.temp}"]`);
                if (first) first.checked = true;
                $$('input[name="temp"]').forEach(r => {
                    r.onchange = () => { if (r.checked) tempItem.temp = (r.value === 'hot' ? 'hot' : 'cold'); };
                });
            } else {
                $('#tempWrap').style.display = 'none';
                $('#tempBox').innerHTML = '';
                tempItem.temp = null;
            }

            renderUpsellSections();
            syncUpsellDraft();

            $('#qtyMinus').onclick = () => {
                tempItem.qty = Math.max(1, tempItem.qty - 1);
                $('#mQty').textContent = String(tempItem.qty);
                updateItemModalPrice();
            };
            $('#qtyPlus').onclick = () => {
                tempItem.qty = Math.min(CLIENT_LIMITS.maxQtyPerLine, tempItem.qty + 1);
                $('#mQty').textContent = String(tempItem.qty);
                updateItemModalPrice();
            };

            $('#addToCart').onclick = () => {
                if (addCartBusy) return;
                if (!allowAction('add_to_cart', CLIENT_LIMITS.addCartCooldownMs)) return;
                if (!getOrderId()) {
                    toast(lang === 'zh' ? '請先建立訂單' : 'Please create an order first');
                    return;
                }
                addCartBusy = true;
                $('#addToCart').disabled = true;
                try {
                    syncUpsellDraft();
                    const sessionId = getOrderId();
                    const me = sanitizeNickname(getNickname() || '訪客') || '訪客';
                    const inlineUpgradeAddOns = (tempItem.extras || [])
                        .filter(ex => ex.sectionKey === 'upgrade_fries')
                        .flatMap((ex) => Array.from({ length: clampInt(ex.qty, 1, CLIENT_LIMITS.maxQtyPerLine, 1) }, () => ({
                            key: ex.key,
                            name: ex.name,
                            enName: ex.enName,
                            price: ex.price
                        })));

                    const detachedExtras = (tempItem.extras || []).filter(ex => ex.sectionKey !== 'upgrade_fries');

                    const mainItem = normalizeCartItem({
                        ...tempItem,
                        addOns: [...(tempItem.addOns || []), ...inlineUpgradeAddOns],
                        extras: [],
                        addedBy: me,
                        lineId: tempItem.lineId || `local_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`
                    });
                    if (!mainItem) {
                        toast(lang === 'zh' ? '商品資料異常，請重試' : 'Invalid item data');
                        return;
                    }

                    function inferExtraCategory(ex) {
                        const name = String(ex.name || '').trim();
                        const drinkNames = ['綠茶', '紅茶', '鮮奶紅茶', '焦糖鮮奶茶', '巧克力可可牛奶', '可口可樂', '雪碧'];
                        const singleNames = ['脆薯', '雞塊', '美式炸雞(兩塊)', '洋蔥圈', '辣肉醬脆薯🌶️', '溫雞肉沙拉/巴薩米克醋'];
                        if (drinkNames.includes(name)) return '飲品';
                        if (singleNames.includes(name)) return '單點';
                        return '單點';
                    }

                    const extraItems = detachedExtras.flatMap((ex) => {
                        const normalized = normalizeCartItem({
                            key: ex.key,
                            name: ex.name,
                            enName: ex.enName,
                            price: ex.price,
                            qty: clampInt(ex.qty, 1, CLIENT_LIMITS.maxQtyPerLine, 1),
                            addOns: [],
                            extras: [],
                            temp: ex.tempSelectable ? (ex.temp || 'cold') : null,
                            addedBy: me,
                            category: ex.category || inferExtraCategory(ex),
                            lineId: `extra_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`
                        });
                        return normalized ? [normalized] : [];
                    }).slice(0, CLIENT_LIMITS.maxExtrasPerItem);

                    const itemsToAdd = normalizeCartPayload([mainItem, ...extraItems]);
                    if (!itemsToAdd.length) return;
                    cart = normalizeCartPayload(mergeItemsIntoCart(cart, itemsToAdd));
                    total = calcCartTotal(cart);
                    updateCartCount();
                    saveCartCache(sessionId);
                    if (isVisible($('#page-cart'))) renderCart();
                    safeSocketEmit('cart_add_many', {
                        sessionId,
                        items: itemsToAdd
                    }, {
                        guardKey: `cart_add_many:${sessionId}:${mainItem.lineId}`,
                        gapMs: CLIENT_LIMITS.addCartCooldownMs
                    });
                    closeModal('itemModal');
                    toast(lang === 'zh' ? '已加入購物車' : 'Added to cart');
                } finally {
                    setTimeout(() => {
                        addCartBusy = false;
                        $('#addToCart').disabled = false;
                    }, CLIENT_LIMITS.addCartCooldownMs);
                }
            };
            openModal('itemModal');
        }

        function renderCart() {
            const sessionId = getOrderId();
            cart = normalizeCartPayload(cart);
            const rows = cart.map((it) => {
                const lineId = it.lineId;
                const addLine = (it.addOns && it.addOns.length) ? `<div class="opt">${I18N.addons[lang]}：${it.addOns.map(a => escapeHtml(lang === 'en' ? (a.enName || a.name) : a.name)).join('、')}</div>` : '';
                const extraLine = (it.extras && it.extras.length) ? `<div class="opt">${I18N.cartExtras[lang]}：${it.extras.map(ex => `${escapeHtml(lang === 'en' ? (ex.enName || ex.name) : ex.name)} × ${Number(ex.qty || 0)}`).join('、')}</div>` : '';
                const tempLine = it.temp ? `<div class="opt">${I18N.tempLabel[lang]}：${escapeHtml(I18N.tempOptions[it.temp]?.[lang] || it.temp)}</div>` : '';
                const lineMoney = calcLinePrice(it);
                return `
                    <div class="cart-card">
                        <div class="cart-row">
                            <div>
                                <div class="cart-name">${escapeHtml(lang === 'en' ? (it.enName || it.name) : it.name)}</div>
                                ${addLine}
                                ${extraLine}
                                ${tempLine}
                            </div>
                            <input class="qty" type="number" min="1" max="${CLIENT_LIMITS.maxQtyPerLine}" value="${Number(it.qty || 1)}" data-lineid="${escapeHtml(lineId || '')}">
                            <div class="price">＄${lineMoney}</div>
                        </div>
                        <div style="margin-top:.65rem;display:flex;justify-content:flex-end;">
                            <button class="btn-remove" data-remove-lineid="${escapeHtml(lineId || '')}">${I18N.delete[lang]}</button>
                        </div>
                    </div>
                `;
            }).join('');

            $('#cartList').innerHTML = rows || `<div class="muted">${lang === 'zh' ? '購物車目前沒有商品' : 'Cart is empty'}</div>`;
            $('#cartTotal').textContent = `＄${calcCartTotal(cart)}`;

            $$('#cartList .qty').forEach(inp => {
                inp.onchange = () => {
                    const lineId = inp.getAttribute('data-lineid');
                    const val = clampInt(inp.value, 1, CLIENT_LIMITS.maxQtyPerLine, 1);
                    inp.value = String(val);
                    const target = cart.find(x => String(x.lineId) === String(lineId));
                    if (!target) return;
                    if (!allowAction(`cart_qty:${lineId}`, CLIENT_LIMITS.qtyCooldownMs)) return;
                    target.qty = val;
                    cart = normalizeCartPayload(cart);
                    total = calcCartTotal(cart);
                    saveCartCache(sessionId);
                    renderCart();
                    safeSocketEmit("cart_set_qty", { sessionId, lineId, qty: val }, { guardKey: `cart_set_qty:${sessionId}:${lineId}`, gapMs: CLIENT_LIMITS.qtyCooldownMs });
                };
            });

            $$('#cartList .btn-remove').forEach(btn => {
                btn.onclick = () => {
                    const lineId = btn.getAttribute('data-remove-lineid');
                    if (!allowAction(`cart_remove:${lineId}`, CLIENT_LIMITS.removeCooldownMs)) return;
                    cart = normalizeCartPayload(cart.filter(x => String(x.lineId) !== String(lineId)));
                    total = calcCartTotal(cart);
                    saveCartCache(sessionId);
                    renderCart();
                    updateCartCount();
                    safeSocketEmit("cart_remove", { sessionId, lineId }, { guardKey: `cart_remove_emit:${sessionId}:${lineId}`, gapMs: CLIENT_LIMITS.removeCooldownMs });
                };
            });
            updateCartCount();
        }

        function renderOrderDetail(detail) {
            if (!detail) {
                $('#odTitle').textContent = I18N.orderDetail[lang];
                $('#odHint').textContent = '目前沒有資料';
                $('#odMeta').style.display = 'none';
                $('#odList').innerHTML = '';
                return;
            }

            lastOrderDetail = detail;
            $('#odTitle').textContent = I18N.orderDetail[lang];
            $('#odHint').textContent = '';
            $('#odMeta').style.display = '';
            setOrderNoPill(lang === 'zh' ? '🧾 訂單號' : '🧾 Order No.', detail.orderId || t('noOrderYet'));
            $('#odTimePill').textContent = `🕒 ${detail.time || detail.createdAt || '--'}`;
            $('#odMeta').querySelector('div[style*="margin-top:.8rem"]').firstElementChild.textContent = lang === 'zh' ? '已送出內容' : 'Submitted Items';

            const items = Array.isArray(detail.items) ? detail.items : [];
            const totalMoney = items.reduce((s, it) => s + calcLinePrice(it), 0);
            $('#odTotalTop').textContent = `＄${totalMoney}`;

            $('#odList').innerHTML = items.map(it => `
                <div class="card" style="padding:.8rem;margin:.5rem 0;">
                    <div style="display:flex;justify-content:space-between;gap:.6rem;">
                        <div>
                            <div style="font-weight:1000">${escapeHtml(lang === 'en' ? (it.enName || it.name) : it.name)}</div>
                            ${it.addOns?.length ? `<div class="muted" style="margin-top:.25rem">${I18N.addons[lang]}：${it.addOns.map(a => escapeHtml(lang === 'en' ? (a.enName || a.name) : a.name)).join('、')}</div>` : ''}
                            ${it.extras?.length ? `<div class="muted" style="margin-top:.25rem">${I18N.cartExtras[lang]}：${it.extras.map(ex => `${escapeHtml(lang === 'en' ? (ex.enName || ex.name) : ex.name)} × ${Number(ex.qty || 0)}`).join('、')}</div>` : ''}
                            ${it.temp ? `<div class="muted" style="margin-top:.25rem">${I18N.tempLabel[lang]}：${escapeHtml(I18N.tempOptions[it.temp]?.[lang] || it.temp)}</div>` : ''}
                        </div>
                        <div style="text-align:right;font-weight:1000">x ${Number(it.qty || 1)}<br>＄${calcLinePrice(it)}</div>
                    </div>
                </div>
            `).join('');
        }

        function requestOrderDetail() {
            const id = getOrderId();
            if (!id) {
                toast(lang === 'zh' ? '請先建立訂單' : 'Please create an order first');
                return;
            }
            if (orderDetailBusy) return;
            if (!allowAction(`order_detail:${id}`, CLIENT_LIMITS.orderDetailCooldownMs)) return;
            orderDetailBusy = true;
            connectSocket();
            safeSocketEmit("order_detail", { sessionId: id }, { guardKey: `order_detail_emit:${id}`, gapMs: CLIENT_LIMITS.orderDetailCooldownMs });
        }

        function restoreWelcomeModalFull() {
            $('#secNewOrder').style.display = '';
            $('#welcomeLaterBtn').style.display = '';
            $('#welcomeTitle').textContent = '歡迎用餐';
            selectedOrderType = null;
            document.querySelectorAll('.order-type-btn').forEach(btn => {
                btn.classList.remove('active');
                btn.setAttribute('aria-pressed', 'false');
            });
            $('#startNewOrderBtn').disabled = true;
            renderStaticTexts();
        }

        function selectOrderType(type) {
            if (type === 'takeout') {
                selectedOrderType = null;
                document.querySelectorAll('.order-type-btn').forEach(btn => {
                    btn.classList.remove('active');
                    btn.setAttribute('aria-pressed', 'false');
                });
                $('#startNewOrderBtn').disabled = true;
                openModal('takeoutNoticeModal');
                return;
            }

            selectedOrderType = type;
            document.querySelectorAll('.order-type-btn').forEach(btn => {
                const active = btn.dataset.orderType === type;
                btn.classList.toggle('active', active);
                btn.setAttribute('aria-pressed', active ? 'true' : 'false');
            });
            $('#startNewOrderBtn').disabled = false;
        }

        async function startNewOrderAndGoMenu() {
            if (joinBusy) return;
            if (selectedOrderType === 'takeout') {
                openModal('takeoutNoticeModal');
                return;
            }
            if (!selectedOrderType) {
                toast(I18N.chooseOrderType[lang]);
                return;
            }
            joinBusy = true;
            $('#startNewOrderBtn').disabled = true;
            try {
                clearAllCartCaches();
                localStorage.removeItem('orderId');
                clearOrderType();
                const nickname = ensureNickname();
                const newId = await createSessionRemote();
                if (!newId) {
                    toast('建立訂單失敗，請稍後再試');
                    return;
                }
                setOrderId(newId);
                setOrderType(selectedOrderType);
                cart = [];
                total = 0;
                saveCartCache(newId);
                updateCartCount();
                joinSocketRoom(newId);
                if (socket?.connected) {
                    safeSocketEmit("set_nickname", { sessionId: newId, nickname }, { guardKey: `set_nickname:${newId}`, gapMs: CLIENT_LIMITS.nicknameCooldownMs });
                }
                closeModal('welcomeModal');
                goMenuPage();
                toast(`已建立訂單：${newId}`);
            } finally {
                joinBusy = false;
                $('#startNewOrderBtn').disabled = false;
            }
        }

        function startSoldoutPolling() {
            if (soldoutTimer) return;
            soldoutTimer = setInterval(async () => {
                try {
                    const before = JSON.stringify(getSold());
                    const remote = await fetchSoldRemote();
                    const after = JSON.stringify(remote);

                    if (before !== after) {
                        if (isVisible($('#page-menu'))) {
                            renderMenuLong();
                        }
                        if (tempItem && $('#itemModal')?.classList.contains('show')) {
                            renderUpsellSections();
                            syncUpsellDraft();
                        }
                    }
                } catch (e) {
                    console.error('soldout polling error:', e);
                }
            }, 3000);
        }

        function stopSoldoutPolling() {
            if (soldoutTimer) {
                clearInterval(soldoutTimer);
                soldoutTimer = null;
            }
        }

        $('#goMenu').onclick = () => {
            restoreWelcomeModalFull();
            openModal('welcomeModal');
        };

        document.querySelectorAll('.order-type-btn').forEach(btn => {
            btn.onclick = () => selectOrderType(btn.dataset.orderType);
        });

        $('#startNewOrderBtn').onclick = startNewOrderAndGoMenu;

        $('#openCartTop').onclick = () => {
            if (isVisible($('#page-home'))) return;
            renderCart();
            hide($('#page-menu'));
            show($('#page-cart'));
            $('#openCartFab').style.display = 'none';
        };

        $('#openCartFab').onclick = () => {
            if (isVisible($('#page-home'))) return;
            renderCart();
            hide($('#page-menu'));
            show($('#page-cart'));
            $('#openCartFab').style.display = 'none';
        };

        $('#backToMenu').onclick = () => {
            hide($('#page-cart'));
            show($('#page-menu'));
            $('#openCartFab').style.display = '';
            updateCartCount();
        };

        $('#backHome').onclick = goHome;

        $('#sendOrder').onclick = async () => {
            await openSubmitReview();
        };

        $('#returnHomeConfirmBtn').onclick = finishSubmittedAndGoHome;

        $('#orderDetailBtn').onclick = () => requestOrderDetail();

        $('#langToggle').onclick = () => {
            lang = (lang === 'zh' ? 'en' : 'zh');
            localStorage.setItem('lang', lang);
            renderHome();
            renderStaticTexts();
            renderTabs();
            renderMenuLong();
            bindSectionSpy();
            if (isVisible($('#page-cart'))) renderCart();
            if (submitPreviewMode && submitPreviewSnapshot) {
                renderSubmitPreviewDetail();
            } else if ($('#orderDetailModal').classList.contains('show')) {
                renderOrderDetail(lastOrderDetail);
            }
        };

        async function initPage() {
            ensureSubmitReviewUi();
            $('#openCartFab').style.display = 'none';
            $('#openCartTop').style.display = 'none';
            startSoldoutPolling();

            renderHome();
            renderStaticTexts();
            renderTabs();
            renderMenuLong();
            bindSectionSpy();

            const saved = getOrderId();
            if (saved) {
                if (!getNickname()) setNickname(nextGuestName());
                const ok = await sessionExistsRemote(saved);
                if (!ok) {
                    clearOrderSession();
                    goHome();
                } else if (await sessionHasSubmittedOrder(saved)) {
                    clearOrderSession();
                    goHome();
                } else {
                    const cached = loadCartCache(saved);
                    if (cached) {
                        cart = cached.cart || [];
                        total = Number(cached.total || 0);
                        updateCartCount();
                    }
                    joinSocketRoom(saved);
                    goMenuPage();
                }
            } else {
                goHome();
            }

            if (!getOrderId()) {
                restoreSubmittedOrderModal();
            }

            fetchSoldRemote().then(arr => {
                setSold(arr);
                renderMenuLong();
            }).catch(() => { });
        }

        initPage();
    </script>
</body>
</html>
